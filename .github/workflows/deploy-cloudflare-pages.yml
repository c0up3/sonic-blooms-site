name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: sonic-blooms-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Sonic Blooms
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy . --project-name=sonic-blooms --branch=main
        env:
          CLOUDFLARE_ACCOUNT_ID: a1196faf7936d80af18210aee09527d3
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN }}
